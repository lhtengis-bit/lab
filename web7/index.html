<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Банхарнаторын Аялал</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="viewport">
        <h1 class="title">Банхарнаторын аялал</h1>
        
        <div class="layer stars"></div>
        <div class="layer hills-far"></div>
        <div class="layer hills-near"></div>

        <div class="bike-wrapper">
            <div class="headlight-beam"></div>
            
            <svg class="bike-frame" viewBox="0 0 100 60">
                <rect x="10" y="30" width="80" height="8" rx="4" fill="#2f3542"/>
                <path d="M70 10 L85 40" stroke="#2f3542" stroke-width="4"/>
            </svg>
            
            <div class="dog">
                <div class="scarf"></div>
                <div class="dog-head">
                    <div class="eye"></div>
                    <div class="nose"></div>
                </div>
            </div>

            <div class="wheel back"></div>
            <div class="wheel front"></div>
        </div>

        <div class="road"></div>
    </div>

</body>
</html>
