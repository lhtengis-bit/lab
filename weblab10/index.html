<html> 
<head> 
<title> VS </title>
<style>
    #left, #right{ position:absolute; top:0; bottom:0; cursor:pointer}
    #left{ left:0; color:#eee }
    #right{ right: 0; color: #900 }
    #left div, #right div, #vs{
        position: absolute; top: 50%; left: 50%;
        margin: -50px 0 0 -50px; width: 100px; height: 100px;
        text-align: center; font-weight: bold;
        font-size: 50px; line-height: 100px; border-radius: 50px; }
    #right, #left div{background-color: #900 }
    #left, #right div{ background-color:#eee }
    #vs{ background-color: #000; color:#fff; box-shadow:2px 2px 5px #000 } 
</style>
</head>
<body>
    <div id="left" onclick="left_click()"> <div></div> </div>
    <div id="right" onclick="right_click()" > <div></div></div>rr
    <div id="vs" >VS</div>
    <script>
        var left = 0, right = 0;
        var leftDiv = document.getElementById("left");
        var rightDiv = document.getElementById("right");
        var vsDiv = document.getElementById("vs");
        function refresh() {
    var leftWidth = Math.min(100, Math.max(0, 50 + left - right));
    var rightWidth = Math.min(100, Math.max(0, 50 - left + right));
    leftDiv.style.width = leftWidth.toString() + "%";
    rightDiv.style.width = rightWidth.toString() + "%";
    vsDiv.style.left = leftWidth.toString() + "%";
    leftDiv.firstElementChild.innerHTML = left;
    rightDiv.firstElementChild.innerHTML = right;
}
        function left_click(){left++; refresh();}
        function right_click() { right++; refresh(); }
        refresh();
        document.onkeydown = function(e) {
    if (e.key === "l" || e.key === "L") left_click();
    if (e.key === "r" || e.key === "R") right_click();
}
    </script>
</body>
</html>
